name: PR delivery gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-delivery-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    name: Verify PR delivery path
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify delivery path (direct-PR default; no-mistakes opt-in)
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Comma-separated label names for explicit no-mistakes opt-in.
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set -eu
          echo "PR #${PR_NUMBER} author=${PR_AUTHOR}"
          bin/fm-pr-delivery-check.sh
